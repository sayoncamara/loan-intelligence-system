version: 2

models:
  - name: stg_loans
    description: "Cleaned raw Lending Club data"
    columns:
      - name: loan_amnt
        tests:
          - not_null
      - name: annual_inc
        tests:
          - not_null
      - name: grade
        tests:
          - not_null
          - accepted_values:
              values: ["A", "B", "C", "D", "E", "F", "G"]
      - name: loan_status
        tests:
          - not_null
          - accepted_values:
              values: ["Fully Paid", "Charged Off"]

  - name: int_loan_features
    description: "Feature-engineered loan data"
    columns:
      - name: target
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: grade_encoded
        tests:
          - not_null
      - name: loan_amnt
        tests:
          - not_null

  - name: mart_training
    description: "Final training table for XGBoost"
    columns:
      - name: target
        tests:
          - not_null
      - name: loan_amnt
        tests:
          - not_null
      - name: dti
        tests:
          - not_null
