version: 1.0
runtime: python311
build:
  commands:
    build:
      - python3.11 -m pip install --upgrade pip
run:
  runtime-version: 3.11
  pre-run:
    - python3.11 -m pip install -r requirements.txt
  command: python3.11 -m streamlit run app.py --server.port 8080 --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false --server.enableWebsocketCompression false
  network:
    port: 8080